<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Heatmap BTC - Control Total</title>
    <style>
        body { font-family: sans-serif; background-color: #1e1e1e; color: white; margin: 20px;}
        .table-container { overflow-x: auto; max-height: 85vh; border: 1px solid #444; }
        table { border-collapse: collapse; white-space: nowrap; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; font-size: 12px; font-weight: bold;}
        th { background-color: #2c2c2c; position: sticky; top: 0; z-index: 1;}
        
        /* Estilos diferenciados para evitar errores */
        .hora-es { color: #5dade2; display: block; font-size: 13px; border-bottom: 1px solid #444; padding-bottom: 2px; }
        .hora-et { color: #f4d03f; display: block; font-size: 11px; margin-top: 4px; }
        
        .col-fija { position: sticky; left: 0; background-color: #2c2c2c; z-index: 2; min-width: 90px;}
        .header-esquina { z-index: 3 !important; }
        .neutro { color: #555 !important; font-weight: normal; }
    </style>
</head>
<body>

    <h2>Análisis BTC (5 Min) - Histórico</h2>
    <div style="margin-bottom: 15px; background: #2c2c2c; padding: 10px; border-radius: 5px; display: inline-block;">
        <span style="color: #5dade2; font-weight: bold;">ESPAÑA 24h</span> | 
        <span style="color: #f4d03f; font-weight: bold;">NuevaYork / POLYMARKET: AM/PM</span>
    </div>
    
    <div class="table-container">
        <table id="heatmapTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

<script>
    const diasSemanas = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
    
    // Función solo para la hora de NY (AM/PM)
    function formatAMPM(horas, minutos) {
        let h = horas % 24;
        if (h < 0) h += 24;
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12;
        h = h ? h : 12;
        const m = minutos.toString().padStart(2, '0');
        return `${h}:${m}${ampm}`;
    }

    // Función para España (24h)
    function format24h(horas, minutos) {
        let h = horas % 24;
        if (h < 0) h += 24;
        return `${h.toString().padStart(2, '0')}:${minutos.toString().padStart(2, '0')}`;
    }

    const intervalos = [];
    for(let h=0; h<24; h++) {
        for(let m=0; m<60; m+=5) {
            let idHora = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
            
            // España en 24h
            let inicioES = format24h(h, m);
            let finES = format24h(h, m + 5);

            // Nueva York en AM/PM
            let inicioET = formatAMPM(h - 5, m);
            let finET = formatAMPM(h - 5, m + 5);

            intervalos.push({
                id: idHora,
                labelES: `${inicioES} - ${finES}`,
                labelET: `${inicioET} - ${finET} (ET)`
            });
        }
    }

    fetch('datos.json')
        .then(response => response.json())
        .then(datosArray => {
            const datosDict = {};
            datosArray.forEach(item => {
                if (!datosDict[item.diaSemana]) datosDict[item.diaSemana] = {};
                datosDict[item.diaSemana][item.hora] = item.probabilidadUp;
            });
            renderizarTabla(datosDict);
        })
        .catch(error => console.error("Error cargando JSON:", error));

function obtenerColorDinamico(probabilidadUp) {
    const UMBRAL_FUERTE = 0.65; 
    if (probabilidadUp >= UMBRAL_FUERTE) {
        let opacidad = ((probabilidadUp - UMBRAL_FUERTE) / (1 - UMBRAL_FUERTE)) * 0.7 + 0.3;
        return `rgba(0, 255, 0, ${opacidad})`;
    }
    let probabilidadDown = 1 - probabilidadUp;
    if (probabilidadDown >= UMBRAL_FUERTE) {
        let opacidad = ((probabilidadDown - UMBRAL_FUERTE) / (1 - UMBRAL_FUERTE)) * 0.7 + 0.3;
        return `rgba(255, 0, 0, ${opacidad})`;
    }
    return 'transparent';
}

function renderizarTabla(datosDict) {
    const thead = document.getElementById('tableHead');
    const tbody = document.getElementById('tableBody');

    let trHead = document.createElement('tr');
    trHead.innerHTML = `<th class="col-fija header-esquina">Día</th>`;
    intervalos.forEach(inter => { 
        trHead.innerHTML += `
            <th>
                <span class="hora-es">${inter.labelES}</span>
                <span class="hora-et">${inter.labelET}</span>
            </th>`; 
    });
    thead.appendChild(trHead);

    diasSemanas.forEach((nombreDia, indiceDia) => {
        let tr = document.createElement('tr');
        tr.innerHTML = `<td class="col-fija">${nombreDia}</td>`;
        
        intervalos.forEach(inter => {
            let probUp = 0.5; 
            if(datosDict[indiceDia] && datosDict[indiceDia][inter.id] !== undefined) {
                probUp = datosDict[indiceDia][inter.id];
            }
            
            let colorFondo = obtenerColorDinamico(probUp);
            let esUp = probUp >= 0.5;
            let valor = esUp ? (probUp * 100) : ((1 - probUp) * 100);
            
            let claseExtra = colorFondo === 'transparent' ? 'class="neutro"' : '';
            let colorTexto = colorFondo === 'transparent' ? '#555' : 'white';

            tr.innerHTML += `<td ${claseExtra} style="background-color: ${colorFondo}; color: ${colorTexto}; border: 1px solid #333;">
                                ${valor.toFixed(0)}% ${esUp ? "UP" : "DOWN"}
                             </td>`;
        });
        tbody.appendChild(tr);
    });
}
</script>
</body>
</html>
