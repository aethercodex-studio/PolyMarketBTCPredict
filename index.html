<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard BTC - Heatmap & Reloj</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header-title">
        <h2>Análisis BTC (UP/DOWN en 5 Min)</h2>
        <p>Dashboard de Probabilidades y Conversor Horario</p>
    </header>

    <div class="table-container">
        <table id="heatmapTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
<div class="card card-link">
    <div class="card-header">
        <h3>🔗 Herramientas Externas</h3>
    </div>
    <p class="helper-text" style="margin-bottom: 20px;">Accede a la calculadora avanzada de Criterio de Kelly para gestionar tu riesgo.</p>
    <a href="https://fical.net/es/calculadora-de-criterio-de-kelly" target="_blank" class="btn-link">
        Abrir Calculadora de Kelly
    </a>
</div>
    <div class="grid-tools">
        <div class="card">
            <div class="card-header">
                <h3>🕒 Conversor Horario</h3>
            </div>
            <div class="input-group">
                <label>Hora España (CET/CEST)</label>
                <input type="time" id="horaCET">
            </div>
            <div class="input-group">
                <label>Hora New York (ET)</label>
                <input type="time" id="horaET">
            </div>
            <p class="helper-text">* La conversión se sincroniza automáticamente al escribir.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
